  <link rel="manifest" href="/site.webmanifest" /></head><style>/* Add dark mode overrides for sections like hero, cards, footer, etc. */

  background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)), url("images/school.jpg") center/cover no-repeat;
}
body.dark-mode .about-box, body.dark-mode .tutor-card, body.dark-mode .contact-box {

  background:#222;
}</style>
<table id="attendanceTable">
  <tr>
    <th>Student Name</th>
    <th>Status</th>
  </tr>
  <tr>
    <td>John Doe</td>
    <td>
      <button onclick="markAttendance('John Doe', true)">Present</button>
      <button onclick="markAttendance('John Doe', false)">Absent</button>
 
</tr>
  </tr>
</table>

<script>
  function markAttendance(student, status) {
    // Example: Save to Firebase or local storage
    const record = {
      student: student,
      date: new Date().toLocaleDateString(),
      status: status ? "Present" : "Absent"
    };

    console.log("Attendance recorded:", record);

    // If using Firebase:
    // firebase.database().ref("attendance").push(record);
  }
  document.addEventListener("DOMContentLoaded", () => {
  if (localStorage.getItem("darkMode") === "enabled" || 
      (!localStorage.getItem("darkMode") && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.body.classList.add("dark-mode");
  }
});

</script>
</body>
</html>
