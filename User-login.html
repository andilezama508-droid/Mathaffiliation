<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learner Login | Mathafilliation</title>

  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="MathAffiliation" />
  <link rel="manifest" href="/site.webmanifest" />

</head>



<body>


<!-- BACK BUTTON -->

<button class="back-btn"
        onclick="window.location.href='Home-page.html'">

        ← Back to Home

</button>



<!-- HEADER -->

<div class="header">

    <img src="images/WhatsApp Image 2025-12-15 at 11.41.20.jpeg">

    <h1>Mathafilliation</h1>

</div>



<!-- LOGIN CARD -->

<div class="login-container">

    <h2>Learner Login</h2>

    <label>Email</label>
    <input type="text"
           id="email"
           placeholder="Enter your email">

    <label>Password</label>
    <input type="password"
           id="password"
           placeholder="Enter your password">


    <div class="forgot-link">
        <a href="#" id="forgot-password">Forgot Password?</a>
    </div>


    <button class="login-btn" id="loginBtn">Login</button>

</div>



<script type="module" src="User-login.js">



</script>

</body>
</html>
