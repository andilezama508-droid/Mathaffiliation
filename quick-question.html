<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Quick Question | MathAffiliation</title>

<link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="shortcut icon" href="/favicon.ico"/>
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>
<meta name="apple-mobile-web-app-title" content="Mathaffiliation"/>
<link rel="manifest" href="/site.webmanifest"/>
<link rel="stylesheet" href="quick-question.css">
</head>
<body>

<div class="navbar">
  <div><strong>MathAffiliation</strong></div>
  <div>
    <a href="dashboard.html">Dashboard</a>
    <button id="darkModeBtn">🌙</button>
  </div>
</div>

<div class="container">

  <form id="questionForm">

    <h2>Upload Quick Question</h2>

    <label>Grade</label>
    <select id="grade" required>
      <option value="">Select Grade</option>
      <option>8</option>
      <option>9</option>
      <option>10</option>
      <option>11</option>
      <option>12</option>
    </select>

    <label>Subject</label>
    <select id="subject" required>
      <option value="">Select Subject</option>
      <option>Mathematics</option>
      <option>Physical Sciences</option>
      <option>English</option>
    </select>

    <label>Topic</label>
    <input type="text" id="topic" placeholder="Example: Algebra" required>

    <label>Write Question</label>
    <textarea id="questionText" rows="4"></textarea>

    <label>Upload Image Question</label>
    <input type="file" id="questionImage" accept="image/*">

    <label>Upload Document Question</label>
    <input type="file" id="questionDoc" accept=".pdf,.doc,.docx">

    <label>Solution</label>
    <textarea id="solution" rows="4" required></textarea>

    <button type="submit">Upload Question</button>
    <p class="success" id="success"></p>

  </form>

</div>

<script type="module" src="quick-question.js">


</script>

</body>
</html>
