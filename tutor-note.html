<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tutor Notes Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="MathAffiliation" />
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="stylesheet" href="tutor-note.css">
</head>

<body>

<div class="topbar">
<button onclick="window.location.href='dashboard3.html'">⬅ Back</button>
<strong>Tutor Notes Manager</strong>
<button onclick="location.reload()">Refresh</button>
</div>

<div class="container">

<h2>Create / Edit Note</h2>

<select id="grade"></select>
<select id="subject"></select>

<input id="unit" placeholder="Unit">
<input id="topic" placeholder="Topic">

<textarea id="text" placeholder="Write notes"></textarea>

<input type="file" id="image" accept="image/*">

<button onclick="saveNote()">Save Note</button>

<hr>

<h2>Your Notes</h2>

<div id="notesList"></div>

</div>

<script type="module" src="tutor-note.js">


</script>

</body>
</html>
