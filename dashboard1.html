<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learner Dashboard | Mathafilliation</title>
<link rel="icon" type="image/png" href="/favicon-96x96.png">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<link rel="stylesheet" href="dashboard1.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
  


</head>
<body>

<div class="topbar">
<h2>Mathafilliation Dashboard</h2>
<button id="logoutBtn">Logout</button>
</div>

<div class="container">
<h1 id="welcomeText">Welcome</h1>
<p id="motivation">Keep up the great work! 🚀</p>

<div class="cards">
  <div class="card">
    <h3>🧠 Attempt Quizzes</h3>
    <p>Get immediate feedback</p>
    <button onclick="location.href='QUIZE2.html'">Open</button>
  </div>

  <div class="card feedback-card">
    <h3>👨‍🏫 Messages</h3>
    <span class="feedback-badge" id="feedbackCount">0</span>
    <p>Ask & get Solutions from tutors</p>
    <button id="feedbackBtn">Open</button>
    <div class="feedback-tooltip" id="feedbackTooltip"></div>
  </div>

  <div class="card">
    <h3>📚 Access documents</h3>
    <p>Exams, Quiz memo, Notes</p>
    <button onclick="location.href='learner-document.html'">Open</button>
  </div>

  <div class="card">
    <h3>📝 My Notes</h3>
    <p>Your saved notes</p>
    <button onclick="location.href='learner-note.html'">Open</button>
  </div>

  <div class="card">
    <h3>📊 My Progress</h3>
    <p>Track performance</p>
    <button onclick="location.href='performance.html'">Open</button>
  </div>
</div>

<div class="chart-container">
<canvas id="progressChart"></canvas>
</div>

<div class="chart-container">
<canvas id="loginChart"></canvas>
</div>

<script type="module" src="dashboard1.js">

</script>
</body>
</html>
