<!DOCTYPE html>
<html lang="en">
<head>
   <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
   <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
   <link rel="shortcut icon" href="/favicon.ico" />
   <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
   <meta name="apple-mobile-web-app-title" content="Mathaffiliation" />
   <link rel="manifest" href="/site.webmanifest" />
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Signup | Mathafilliation</title>
   <link rel="stylesheet"   href="signup.css">
</head>
<body>

<div class="topbar">
  Mathafilliation — Create Account
  <button class="back-btn" onclick="window.location.href='Home-page.html'">← Back</button>
</div>

<div class="page">
    <div class="signup-container">
        <h1>Sign Up</h1>

        <form id="signupForm">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" placeholder="e.g. 071 234 5678" required>
            </div>

            <div class="form-group">
                <label for="grade">Grade</label>
                <select id="grade" required>
                    <option value="">Select Grade</option>
                    <option value="8">Grade 8</option>
                    <option value="9">Grade 9</option>
                    <option value="10">Grade 10</option>
                    <option value="11">Grade 11</option>
                    <option value="12">Grade 12</option>
                </select>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>

            <div class="form-group">
                <label for="confirm">Confirm Password</label>
                <input type="password" id="confirm" required>
            </div>

            <button type="submit" class="signup-btn">Create Account</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="User-login.html">Sign in</a>
        </div>
    </div>
</div>

<!-- Firebase Signup Logic -->
<script type="module" src="signup.js">


</script>

</body>
</html>
